name: Albaik Automation CI/CD Pipeline

on:
  push:
    branches: [ "master", "main", "talha-automation", "hamza-automation" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:
    inputs:
      test_platform:
        description: 'Test Platform to Run'
        required: true
        default: 'cross-platform'
        type: choice
        options:
          - cross-platform
          - mobile
          - web
          - dual-mobile

jobs:
  execute-automation-tests:
    name: Execute E2E Tests on Physical Device
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Verify and Wake Physical Android Device
        run: |
          $devices = adb devices | Select-String -Pattern "\sdevice$"
          if (-not $devices) {
            Write-Error "CRITICAL: No physical Android device connected or authorized!"
            exit 1
          }
          # Wake up the screen if it's asleep
          adb shell input keyevent 26
        shell: powershell

      - name: Start Appium Server
        run: |
          $appiumProcess = Start-Process -NoNewWindow -FilePath "npx" -ArgumentList "appium", "--relaxed-security" -RedirectStandardOutput "appium.log" -RedirectStandardError "appium_error.log" -PassThru
          echo "APPIUM_PID=$($appiumProcess.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append
          
          # Wait for Appium to be ready (up to 30 seconds)
          npx -y wait-on http://127.0.0.1:4723/status -t 30000
        shell: powershell

      - name: Execute Automation Test Suite
        env:
          TEST_PLATFORM: ${{ github.event.inputs.test_platform || 'cross-platform' }}
          CI: true
        run: npm run test:${env:TEST_PLATFORM}
        shell: powershell

      - name: Generate Allure Test Report
        run: npm run allure:generate
        shell: powershell
        if: always()

      - name: Upload Cucumber HTML Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-html-report
          path: cucumber-html-reports
          retention-days: 14

      - name: Send Email Notification with Results
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Automation Test Results - ${{ github.repository }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          cc: ${{ secrets.CC_EMAIL }}
          from: GitHub Actions Bot
          body: |
            The automated tests have finished running! 
            
            You can download the full Cucumber BDD HTML test report securely by clicking the link below:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            (Scroll down to the "Artifacts" section at the bottom of that page and click "cucumber-html-report" to download the ZIP file).

      - name: Cleanup Appium Server Process
        if: always()
        run: |
          if ($env:APPIUM_PID) {
            Stop-Process -Id $env:APPIUM_PID -Force -ErrorAction SilentlyContinue
          }
        shell: powershell
